services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexyalgo-site
    restart: unless-stopped
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
networks:
  coolify:
    external: true
