name: Deploy static export

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub environment with Hostinger deploy secrets
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to build and deploy
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.meta.outputs.deploy_environment }}
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
      deploy_sha: ${{ steps.sha.outputs.deploy_sha }}
    steps:
      - name: Resolve deploy target
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.deploy_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Resolve built commit SHA
        id: sha
        shell: bash
        run: echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Stamp static artifact with build metadata
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.meta.outputs.deploy_environment }}
          DEPLOY_REF: ${{ steps.meta.outputs.deploy_ref }}
          DEPLOY_SHA: ${{ steps.sha.outputs.deploy_sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        shell: bash
        run: |
          export BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "environment": os.environ["DEPLOY_ENVIRONMENT"],
              "ref": os.environ["DEPLOY_REF"],
              "sha": os.environ["DEPLOY_SHA"],
              "runId": os.environ["RUN_ID"],
              "runAttempt": os.environ["RUN_ATTEMPT"],
              "runNumber": os.environ["RUN_NUMBER"],
              "workflow": os.environ["WORKFLOW_NAME"],
              "repository": os.environ["REPOSITORY"],
              "repositoryUrl": os.environ["REPOSITORY_URL"],
              "builtAt": os.environ["BUILT_AT"],
          }

          path = Path("out/build-meta.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2) + "\n")
          print(path.read_text())
          PY

      - name: Upload static export artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.deploy_environment }}
    steps:
      - name: Download static export artifact
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out

      - name: Install SSH tooling
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Configure SSH access
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST != '' && vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
          DEPLOY_KNOWN_HOSTS: ${{ vars.DEPLOY_KNOWN_HOSTS != '' && vars.DEPLOY_KNOWN_HOSTS || secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Missing DEPLOY_HOST (env var or secret) or DEPLOY_SSH_KEY (secret) for environment ${{ needs.build.outputs.deploy_environment }}" >&2
            exit 1
          fi

          port="$DEPLOY_PORT"
          [ -n "$port" ] || port=22

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Stage artifact on Hostinger
        env:
          DEPLOY_CONTAINER: ${{ vars.DEPLOY_CONTAINER != '' && vars.DEPLOY_CONTAINER || secrets.DEPLOY_CONTAINER }}
          DEPLOY_CONTAINER_PATH: ${{ vars.DEPLOY_CONTAINER_PATH != '' && vars.DEPLOY_CONTAINER_PATH || secrets.DEPLOY_CONTAINER_PATH }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST != '' && vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER != '' && vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          REMOTE_STAGE_DIR: /tmp/lexyalgo-static-export-${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ]; then
            echo "Missing one of DEPLOY_HOST or DEPLOY_USER (env vars or secrets)" >&2
            exit 1
          fi

          if [ -n "$DEPLOY_CONTAINER" ] && [ -z "$DEPLOY_CONTAINER_PATH" ]; then
            echo "DEPLOY_CONTAINER_PATH is required when DEPLOY_CONTAINER is set" >&2
            exit 1
          fi

          if [ -z "$DEPLOY_CONTAINER" ] && [ -z "$DEPLOY_PATH" ]; then
            echo "Missing DEPLOY_PATH for host-path deploy, or set DEPLOY_CONTAINER + DEPLOY_CONTAINER_PATH for container deploy" >&2
            exit 1
          fi

          port="$DEPLOY_PORT"
          [ -n "$port" ] || port=22

          ssh -i ~/.ssh/id_ed25519 -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "rm -rf '$REMOTE_STAGE_DIR' && mkdir -p '$REMOTE_STAGE_DIR'"

          rsync \
            --archive \
            --compress \
            --delete \
            --human-readable \
            -e "ssh -i ~/.ssh/id_ed25519 -p $port" \
            out/ "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_STAGE_DIR/"

      - name: Promote staged artifact to live target
        env:
          DEPLOY_CONTAINER: ${{ vars.DEPLOY_CONTAINER != '' && vars.DEPLOY_CONTAINER || secrets.DEPLOY_CONTAINER }}
          DEPLOY_CONTAINER_PATH: ${{ vars.DEPLOY_CONTAINER_PATH != '' && vars.DEPLOY_CONTAINER_PATH || secrets.DEPLOY_CONTAINER_PATH }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST != '' && vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER != '' && vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          REMOTE_STAGE_DIR: /tmp/lexyalgo-static-export-${{ github.run_id }}-${{ github.run_attempt }}
          RUN_SUFFIX: ${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: |
          port="$DEPLOY_PORT"
          [ -n "$port" ] || port=22

          if [ -n "$DEPLOY_CONTAINER" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" /bin/sh <<EOF
          set -e
          docker inspect "$DEPLOY_CONTAINER" >/dev/null
          target="$DEPLOY_CONTAINER_PATH"
          parent=\$(dirname "\$target")
          base=\$(basename "\$target")
          incoming="\$parent/.\$base.incoming-$RUN_SUFFIX"
          backup="\$parent/.\$base.previous-$RUN_SUFFIX"
          docker exec -e TARGET_PATH="\$target" -e TARGET_PARENT="\$parent" -e INCOMING_PATH="\$incoming" -e BACKUP_PATH="\$backup" "$DEPLOY_CONTAINER" sh -lc '
            set -e
            mkdir -p "$TARGET_PARENT"
            rm -rf "$INCOMING_PATH" "$BACKUP_PATH"
            mkdir -p "$INCOMING_PATH"
          '
          tar -C "$REMOTE_STAGE_DIR" -cf - . | docker exec -i -e INCOMING_PATH="\$incoming" "$DEPLOY_CONTAINER" sh -lc 'set -e; tar -xf - -C "$INCOMING_PATH"'
          docker exec -e TARGET_PATH="\$target" -e INCOMING_PATH="\$incoming" -e BACKUP_PATH="\$backup" "$DEPLOY_CONTAINER" sh -lc '
            set -e
            if [ -e "$TARGET_PATH" ]; then mv "$TARGET_PATH" "$BACKUP_PATH"; fi
            mv "$INCOMING_PATH" "$TARGET_PATH"
            rm -rf "$BACKUP_PATH"
          '
          rm -rf "$REMOTE_STAGE_DIR"
          EOF
          else
            ssh -i ~/.ssh/id_ed25519 -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" /bin/sh <<EOF
          set -e
          target='$DEPLOY_PATH'
          parent=\$(dirname "\$target")
          base=\$(basename "\$target")
          incoming="\$parent/.\$base.incoming-$RUN_SUFFIX"
          backup="\$parent/.\$base.previous-$RUN_SUFFIX"
          mkdir -p "\$parent"
          rm -rf "\$incoming" "\$backup"
          mkdir -p "\$incoming"
          tar -C '$REMOTE_STAGE_DIR' -cf - . | tar -xf - -C "\$incoming"
          if [ -e "\$target" ]; then mv "\$target" "\$backup"; fi
          mv "\$incoming" "\$target"
          rm -rf "\$backup" '$REMOTE_STAGE_DIR'
          EOF
          fi

      - name: Verify deployed build metadata
        env:
          DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL != '' && vars.DEPLOY_BASE_URL || secrets.DEPLOY_BASE_URL }}
          EXPECTED_SHA: ${{ needs.build.outputs.deploy_sha }}
        shell: bash
        run: |
          if [ -z "$DEPLOY_BASE_URL" ]; then
            echo "DEPLOY_BASE_URL not set for this environment, skipping URL verification."
            exit 0
          fi

          curl --fail --silent --show-error "$DEPLOY_BASE_URL/build-meta.json" --output deployed-build-meta.json
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("deployed-build-meta.json").read_text())
          expected = os.environ["EXPECTED_SHA"]
          actual = payload.get("sha")
          if actual != expected:
              raise SystemExit(f"deploy verification failed: expected {expected}, got {actual}")
          print(json.dumps(payload, indent=2))
          PY
