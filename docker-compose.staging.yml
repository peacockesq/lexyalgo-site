services:
  site:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: lexyalgo-site-staging
    restart: unless-stopped
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
networks:
  coolify:
    external: true
    name: coolify
